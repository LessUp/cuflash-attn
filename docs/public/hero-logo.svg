<svg viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <defs>
    <linearGradient id="gradientBg" x1="20" y1="20" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3f83f8" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.3"/>
    </linearGradient>
    
    <linearGradient id="gpuBody" x1="40" y1="40" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3f83f8"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    
    <linearGradient id="gpuStroke" x1="40" y1="40" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3f83f8"/>
    </linearGradient>
    
    <linearGradient id="flash" x1="100" y1="140" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="arithmetic" k2="-1" k3="1"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="120" cy="120" r="100" fill="url(#gradientBg)"/>
  
  <!-- GPU main body -->
  <rect x="50" y="50" width="140" height="140" rx="16" fill="url(#gpuBody)" stroke="url(#gpuStroke)" stroke-width="3"/>
  
  <!-- GPU chip sections -->
  <rect x="65" y="65" width="45" height="35" rx="6" fill="rgba(255,255,255,0.25)"/>
  <rect x="120" y="65" width="55" height="35" rx="6" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Memory banks -->
  <rect x="65" y="110" width="25" height="15" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="100" y="110" width="25" height="15" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="135" y="110" width="25" height="15" rx="3" fill="rgba(255,255,255,0.15)"/>
  
  <rect x="65" y="135" width="25" height="15" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="100" y="135" width="25" height="15" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="135" y="135" width="25" height="15" rx="3" fill="rgba(255,255,255,0.15)"/>
  
  <rect x="65" y="160" width="25" height="15" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="100" y="160" width="25" height="15" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="135" y="160" width="25" height="15" rx="3" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Flash bolt overlay -->
  <g transform="translate(85, 85) scale(0.6)">
    <path d="M85 10L45 90H75L55 140L95 60H65L85 10Z" fill="url(#flash)" stroke="#f59e0b" stroke-width="2" filter="url(#glow)"/>
  </g>
  
  <!-- Connection lines suggesting data flow -->
  <line x1="50" y1="45" x2="50" y2="40" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <line x1="90" y1="45" x2="90" y2="40" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <line x1="130" y1="45" x2="130" y2="40" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <line x1="170" y1="45" x2="170" y2="40" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="195" x2="50" y2="200" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <line x1="90" y1="195" x2="90" y2="200" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <line x1="130" y1="195" x2="130" y2="200" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <line x1="170" y1="195" x2="170" y2="200" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
</svg>
