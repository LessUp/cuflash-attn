name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.2.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version from tag or input
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: '12.4.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cccl"]'

      - name: Configure CMake
        run: cmake --preset release -DCMAKE_CUDA_ARCHITECTURES="80"

      - name: Build library
        run: cmake --build --preset release -j$(nproc)

      - name: Run tests
        run: ctest --preset release --output-on-failure

      - name: Build docs
        working-directory: docs
        run: |
          npm ci
          npm run docs:build

      - name: Generate changelog
        id: changelog
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const changelog = commits.slice(0, 20).map(c => {
              const sha = c.sha.substring(0, 7);
              const message = c.commit.message.split('\n')[0];
              return `- ${message} (${sha})`;
            }).join('\n');
            
            return changelog;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## CuFlash-Attn ${{ steps.version.outputs.version }}
            
            ### Changes | 变更
            ${{ steps.changelog.outputs.result }}
            
            ### Installation | 安装
            
            **English:**
            ```bash
            git clone https://github.com/LessUp/cuflash-attn.git
            cd cuflash-attn
            cmake --preset release
            cmake --build --preset release
            ```
            
            **中文:**
            ```bash
            git clone https://github.com/LessUp/cuflash-attn.git
            cd cuflash-attn
            cmake --preset release
            cmake --build --preset release
            ```
          files: |
            build/release/libcuflash_attn.so
            build/release/libcuflash_attn.a
          draft: false
          prerelease: false
          generate_release_notes: true
