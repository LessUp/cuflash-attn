name: "CodeQL Security Analysis"

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "openspec/**"
      - "README*.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "CLAUDE*.md"
      - "CONTRIBUTING.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/copilot-instructions.md"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "openspec/**"
      - "README*.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "CLAUDE*.md"
      - "CONTRIBUTING.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/copilot-instructions.md"
  schedule:
    - cron: '0 6 * * 1'  # Run weekly on Monday at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          queries: +security-and-quality

      - name: Install CUDA toolkit (for C++ analysis)
        uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: '12.4.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cccl"]'

      - name: Configure CMake (for C++ analysis)
        run: cmake --preset release -DCMAKE_CUDA_ARCHITECTURES="80"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"
