name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "openspec/**"
      - "README*.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "CLAUDE*.md"
      - "CONTRIBUTING.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/copilot-instructions.md"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "openspec/**"
      - "README*.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "CLAUDE*.md"
      - "CONTRIBUTING.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/copilot-instructions.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check C/C++/CUDA formatting
        uses: jidicula/clang-format-action@v4.15.0
        with:
          clang-format-version: '17'
          check-path: '.'
          exclude-regex: '(^|/)(build|third_party|external|vendor|\.git)(/|$)'
          fallback-style: 'Google'

  docs-build:
    name: Docs Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run docs:build

  build-test:
    name: Build & Test (Release)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: '12.4.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cccl"]'

      - name: Configure CMake
        run: cmake --preset release -DCMAKE_CUDA_ARCHITECTURES="80"

      - name: Build
        run: cmake --build --preset release -j2

      - name: Install Python test dependencies
        run: python3 -m pip install -r tests/integration/requirements.txt

      - name: Run tests
        run: ctest --preset release --output-on-failure -j2

  configure-minimal:
    name: Configure Minimal Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: '12.4.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cccl"]'

      - name: Configure CMake minimal preset
        run: cmake --preset minimal

      - name: Build minimal preset
        run: cmake --build --preset minimal
